services:
  - type: web
    name: my-resume-cv
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python resume/deploy.py
    dockerfilePath: ""
    dockerContext: ""
    usePoetry: false
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///instance/resume_db.db
      - key: FLASK_ENV
        value: production
