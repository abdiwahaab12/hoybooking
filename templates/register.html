{% extends "base.html" %}
{% block title %}Register - HOYBOOKING{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="section-title text-start">
        <h2>Create your account</h2>
        <p>Join HOYBOOKING and complete bookings faster.</p>
      </div>
      <form method="post" class="room-card p-4">
        <input type="hidden" name="next" value="{{ request.args.get('next','') }}" />
        <div class="mb-3">
          <label class="form-label">Full name</label>
          <input class="form-control" name="name" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" name="email" type="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" name="password" type="password" minlength="6" required />
        </div>
        <button class="btn btn-success w-100" type="submit">Sign up</button>
      </form>
      <p class="mt-3 muted">
        Already have an account?
        <a href="{{ url_for('auth.login', next=request.args.get('next','')) }}">Login</a>
      </p>
    </div>
  </div>
{% endblock %}
