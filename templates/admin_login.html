{% extends "base.html" %}
{% block title %}Admin Login - HOYBOOKING{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="section-title text-start">
        <h2>Admin Login</h2>
        <p>Sign in to manage rooms, bookings, users, and reports.</p>
      </div>
      <form method="post" class="room-card p-4">
        <input type="hidden" name="next" value="{{ request.args.get('next','') }}" />
        <div class="mb-3">
          <label class="form-label">Admin Email</label>
          <input class="form-control" name="email" type="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" name="password" type="password" required />
        </div>
        <button class="btn btn-primary w-100" type="submit">Login as Admin</button>
      </form>
      <p class="mt-3 muted">
        Customer? <a href="{{ url_for('auth.login') }}">Go to User Login</a>
      </p>
    </div>
  </div>
{% endblock %}
